<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Notes Generator</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons (for futuristic icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <main class="app-container glass-panel">
        <header class="app-header">
            <div class="logo-area">
                <i class="ph-fill ph-magic-wand"></i>
                <h1>NeuroNotes AI</h1>
            </div>
            <p class="subtitle">Transform any topic into comprehensive, structured notes instantly.</p>
        </header>

        <section class="input-section">
            <div class="input-wrapper">
                <label for="topicInput" class="sr-only">Topic or Subject</label>
                <textarea 
                    id="topicInput" 
                    placeholder="Enter a topic... (e.g., Quantum Physics fundamentals, History of Rome)" 
                    rows="3"
                ></textarea>
                <button id="generateBtn" class="primary-btn">
                    <span class="btn-text">Generate Notes</span>
                    <i class="ph-bold ph-sparkle"></i>
                </button>
            </div>
        </section>

        <section id="loadingSection" class="loading-section hidden">
            <div class="spinner"></div>
            <p>Synthesizing knowledge...</p>
        </section>

        <section id="outputSection" class="output-section hidden">
            <div class="output-header">
                <h2>Generated Notes</h2>
                <button id="copyBtn" class="icon-btn" title="Copy to clipboard">
                    <i class="ph ph-copy"></i>
                </button>
            </div>
            <div id="notesContent" class="notes-content markdown-body">
                <!-- Content injected via JS -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
